name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22
          - 24

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  package:
    name: Package smoke test
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Pack and install as a consumer
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PACKAGE_DIR=$(mktemp -d)
          npm pack --pack-destination "${PACKAGE_DIR}"
          PACKAGE_PATH="${PACKAGE_DIR}/imessage-sdk-${VERSION}.tgz"
          CONSUMER=$(mktemp -d)
          cd "${CONSUMER}"
          npm init --yes >/dev/null
          npm install "${PACKAGE_PATH}" >/dev/null
          node --input-type=module -e '
            await import("imessage-sdk");
            await import("imessage-sdk/providers/blooio");
            await import("imessage-sdk/providers/photon");
          '
        working-directory: packages/imessage-sdk
