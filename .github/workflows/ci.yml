name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22
          - 24

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test

  changesets:
    name: Verify changeset
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm changeset status --since=origin/main

  package:
    name: Package smoke test
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Pack and install as a consumer
        shell: bash
        run: |
          PACKAGE_DIR=$(mktemp -d)
          pnpm --filter imessage-sdk pack --pack-destination "${PACKAGE_DIR}"
          pnpm --filter @imessage-sdk/blooio pack --pack-destination "${PACKAGE_DIR}"
          pnpm --filter @imessage-sdk/photon pack --pack-destination "${PACKAGE_DIR}"
          for PACKAGE_PATH in "${PACKAGE_DIR}"/*.tgz; do
            pnpm exec publint "${PACKAGE_PATH}" --strict
            pnpm exec attw "${PACKAGE_PATH}" --profile esm-only
          done
          CONSUMER=$(mktemp -d)
          cp -R test/package-consumer/. "${CONSUMER}"
          npm install --prefix "${CONSUMER}" "${PACKAGE_DIR}"/*.tgz >/dev/null
          pnpm exec tsc --project "${CONSUMER}/tsconfig.json"
          cd "${CONSUMER}"
          node --input-type=module -e '
            await import("imessage-sdk");
            await import("@imessage-sdk/blooio");
            await import("@imessage-sdk/photon");
          '
