name: Publish

on:
  push:
    tags:
      - "imessage-sdk@*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-production

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Prepare release
        id: release
        shell: bash
        run: |
          VERSION=$(node -p "require('./packages/imessage-sdk/package.json').version")
          test "${GITHUB_REF_NAME}" = "imessage-sdk@${VERSION}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          if [[ "${VERSION}" == *-* ]]; then
            echo "dist_tag=beta" >> "${GITHUB_OUTPUT}"
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "dist_tag=latest" >> "${GITHUB_OUTPUT}"
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi
          if npm view "imessage-sdk@${VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "already_published=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Publish to npm
        if: steps.release.outputs.already_published == 'false'
        run: npm publish --access public --tag "${{ steps.release.outputs.dist_tag }}"
        working-directory: packages/imessage-sdk
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub Release ${GITHUB_REF_NAME} already exists."
            exit 0
          fi
          args=(
            "${GITHUB_REF_NAME}"
            --verify-tag
            --generate-notes
            --title "imessage-sdk ${{ steps.release.outputs.version }}"
          )
          if [[ "${{ steps.release.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"
